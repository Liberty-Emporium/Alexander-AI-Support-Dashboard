<!DOCTYPE html>
<html lang="en" data-theme="scifi">
<head>
  <meta charset="UTF-8" />
  <script src="/socket.io/socket.io.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexander AI — Support Dashboard</title>
  <link rel="icon" href="/favicon.svg" />
  <style>
    /* ── SciFi Theme ──────────────────────────────────────────────────── */
    :root {
      --bg:            #060b18;
      --sidebar:       #0a1628;
      --panel:         #0d1b2a;
      --card:          #112240;
      --card2:         #153258;
      --border:        #1a3a5c;
      --text:          #e0f7fa;
      --muted:         #5d9bb8;
      --accent:        #00f0ff;
      --accent-sub:    rgba(0,240,255,0.08);
      --accent-border: rgba(0,240,255,0.25);
      --success:       #64ffda;
      --warning:       #ff6b35;
      --danger:        #ff5252;
      --shadow:        0 4px 16px rgba(0,0,0,0.5), 0 0 1px rgba(0,240,255,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────── */
    #sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .logo svg { width: 36px; height: 36px; flex-shrink: 0; }
    .logo-text { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .logo-sub  { font-size: 11px; color: var(--muted); }
    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
    }
    nav a:hover, nav a.active {
      color: var(--accent);
      background: var(--accent-sub);
      border-left-color: var(--accent);
    }
    nav a .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    #logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
      width: 100%;
      transition: all 0.15s;
    }
    #logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* ── Main ─────────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-online  { background: rgba(100,255,218,0.15); color: var(--success); }
    .badge-offline { background: rgba(255,82,82,0.12);   color: var(--danger); }
    .badge-warn    { background: rgba(255,107,53,0.12);  color: var(--warning); }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* ── Stats row ────────────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }

    /* ── Tables ───────────────────────────────────────────────────────── */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--panel);
      padding: 10px 16px;
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--panel); }
    td { padding: 12px 16px; color: var(--text); vertical-align: middle; }
    .mono { font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; color: var(--accent); }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      padding: 7px 14px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(255,82,82,0.15); border: 1px solid var(--danger); color: var(--danger); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── Login screen ─────────────────────────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--accent-border);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 0 60px rgba(0,240,255,0.08);
      text-align: center;
    }
    .login-box svg { width: 56px; height: 56px; margin-bottom: 16px; }
    .login-box h2 { font-size: 22px; margin-bottom: 6px; }
    .login-box p  { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    #login-error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }

    /* ── Modal ────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(6,11,24,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      width: 500px;
      max-width: 95vw;
    }
    .modal h3 { font-size: 16px; margin-bottom: 20px; }
    .modal .form-group { margin-bottom: 14px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ── Command output ──────────────────────────────────────────────── */
    .cmd-output {
      background: #070d1c;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      color: #64ffda;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 12px;
    }

    /* ── Event type dots ─────────────────────────────────────────────── */
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot-offline { background: var(--muted); }
    .dot-error   { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

    /* ── Misc ─────────────────────────────────────────────────────────── */
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
    .flex  { display: flex; gap: 10px; align-items: center; }
    .ml-auto { margin-left: auto; }
    .hidden { display: none !important; }
    select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 13px;
    }
    textarea {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      resize: vertical;
      outline: none;
      font-family: monospace;
    }
    textarea:focus { border-color: var(--accent); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

<!-- APP SHELL -->
<div id="sidebar">
  <div class="logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
      <defs><linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1E30AA"/>
        <stop offset="50%" stop-color="#3050FF"/>
        <stop offset="100%" stop-color="#5070FF"/>
      </linearGradient></defs>
      <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#lg2)"/>
      <rect x="47" y="22" width="6" height="56" rx="3" fill="#FFD700"/>
      <path d="M 35 30 Q 50 22, 50 30" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 65 30 Q 50 22, 50 30" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 38 58 Q 30 50, 38 42 Q 46 34, 50 38" stroke="#E8ECFF" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M 62 58 Q 70 50, 62 42 Q 54 34, 50 38" stroke="#E8ECFF" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <circle cx="50" cy="22" r="5" fill="#FFD700"/>
    </svg>
    <div>
      <div class="logo-text">Alexander AI</div>
      <div class="logo-sub">Support Dashboard</div>
    </div>
  </div>
  <nav>
    <a onclick="showPage('dashboard')" class="active" id="nav-dashboard">

    <a onclick="showPage('clients')" id="nav-clients">
      <span class="icon">👥</span> Clients

    <a onclick="showPage('machines')" id="nav-machines">
      <span class="icon">🖥</span> Machines
    </a>
    <a onclick="showPage('events')" id="nav-events">
      <span class="icon">⚡</span> Events
    </a>
    <a onclick="showPage('terminal')" id="nav-terminal">

    </a>

  </nav>
  <div class="sidebar-footer">

</div>

<div id="main">
  <header>
    <h1 id="page-title">Dashboard</h1>
    <div id="header-actions"></div>
  </header>
  <div id="content">
    <!-- Pages rendered here by JS -->
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div id="modal-add-client" class="modal-overlay hidden">
  <div class="modal">

    <div class="form-group"><label>Client Name *</label><input type="text" id="ac-name" placeholder="e.g. John Smith" /></div>

<!-- REPAIR MODAL -->

  <div class="modal">
    <h3>🔧 AI Repair — <span id="repair-machine-name"></span></h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">
      KiloClaw will SSH into this machine, diagnose the problem, apply fixes, and report back.
    </p>

      <label>What's the problem?</label>
      <select id="repair-preset" onchange="document.getElementById('repair-problem').value=this.value">
        <option value="">-- choose preset or type below --</option>
        <option value="Hermes crashed and won't restart">Hermes crashed / won't restart</option>
        <option value="Agent Zero container is down">Agent Zero container is down</option>
        <option value="Disk is full or nearly full">Disk is full or nearly full</option>
        <option value="Python or pip is broken">Python / pip broken</option>
        <option value="Liberty Agent stopped reporting">Liberty Agent stopped reporting</option>
        <option value="No internet connection">No internet connection</option>

    <div class="form-group">
      <label>Or describe in your own words</label>
      <input type="text" id="repair-problem" placeholder="e.g. 'hermes keeps crashing every hour'" />

    <div id="repair-output-area"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-repair')">Close</button>

<!-- COMMAND MODAL -->

  <div class="modal">
    <h3>Run Command on <span id="cmd-machine-name"></span></h3>
    <div class="form-group">
      <label>Select Command</label>
      <select id="cmd-select" onchange="updateCmdInput()">
        <option value="">-- choose preset --</option>

        <option value="docker logs agent-zero">docker logs agent-zero</option>
        <option value="hermes status">hermes status</option>
        <option value="hermes logs">hermes logs</option>
        <option value="hermes doctor">hermes doctor</option>
        <option value="tail -50 ~/.hermes/logs/agent.log">tail -50 ~/.hermes/logs/agent.log</option>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-command')">Close</button>
      <button class="btn btn-primary" onclick="runCommand()">Run</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('aai_token') || '';
let currentPage = 'dashboard';
let cmdMachineId = '';

// ── API Helper ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN,
      ...(opts.headers || {}),
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 401) { doLogout(); return null; }
  return res.json();
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-user').value;
  const password = document.getElementById('login-pass').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  });
  if (res.ok) {
    const data = await res.json();
    TOKEN = data.token;
    localStorage.setItem('aai_token', TOKEN);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-name').textContent = '👤 ' + data.username;
    connectAdminSocket();
    loadPage('dashboard');
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('aai_token');
  location.reload();
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  currentPage = page;
  loadPage(page);
}

async function loadPage(page) {
  document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
  document.getElementById('header-actions').innerHTML = '';
  const content = document.getElementById('content');

  if (page === 'dashboard') await renderDashboard(content);
  else if (page === 'clients')  await renderClients(content);
  else if (page === 'machines') await renderMachines(content);
  else if (page === 'events')   await renderEvents(content);
  else if (page === 'terminal') renderTerminal(content);
}

// ── Dashboard ──────────────────────────────────────────────────────────────
async function renderDashboard(el) {
  const [stats, events] = await Promise.all([api('/stats'), api('/events?limit=20')]);
  if (!stats) return;
  el.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value">${stats.totalClients}</div></div>
      <div class="stat-card"><div class="stat-label">Total Machines</div><div class="stat-value">${stats.totalMachines}</div></div>
      <div class="stat-card"><div class="stat-label">Online Now</div><div class="stat-value" style="color:var(--success)">${stats.onlineMachines}</div></div>
      <div class="stat-card"><div class="stat-label">Errors (24h)</div><div class="stat-value" style="color:${stats.errorCount24h > 0 ? 'var(--danger)' : 'var(--success)'}">${stats.errorCount24h}</div></div>
    </div>
    <div class="section-title">Recent Events</div>
    <div class="card">${renderEventsTable(events)}</div>
  `;
}

// ── Clients ────────────────────────────────────────────────────────────────
async function renderClients(el) {
  document.getElementById('header-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openModal('modal-add-client')">+ Add Client</button>`;
  const clients = await api('/clients');
  if (!clients) return;
  el.innerHTML = `
    <div class="card">
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Agent</th>
          <th>Machines</th><th>Online</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${clients.length ? clients.map(c => `
            <tr>
              <td><strong>${esc(c.name)}</strong></td>
              <td>${esc(c.email || '—')}</td>
              <td><span class="badge ${c.agent_type === 'hermes' ? 'badge-online' : 'badge-warn'}">${c.agent_type}</span></td>
              <td>${c.machine_count || 0}</td>
              <td><span class="dot dot-${c.online_count > 0 ? 'online' : 'offline'}"></span>${c.online_count || 0}</td>
              <td style="color:var(--muted);font-size:12px">${c.created_at?.slice(0,10)}</td>
              <td>

async function submitAddClient() {
  const name  = document.getElementById('ac-name').value.trim();
  if (!name) return alert('Name is required');
  const data = await api('/clients', {
    method: 'POST',
    body: {
      name,
      email: document.getElementById('ac-email').value,
      agent_type: document.getElementById('ac-type').value,
      notes: document.getElementById('ac-notes').value,
    }
  });
  if (data?.id) {
    closeModal('modal-add-client');
    alert(`✅ Client created!\nInstall Token: ${data.install_token}\n\nShare this token with the customer.`);
    showPage('clients');
  }
}

async function deleteClient(id) {
  if (!confirm('Delete this client and all their data?')) return;
  await api('/clients/' + id, { method: 'DELETE' });
  showPage('clients');
}

// ── Command Modal ──────────────────────────────────────────────────────────
// ── Repair Modal ───────────────────────────────────────────────────
let repairMachineId = '';
let repairAgentType = 'hermes';

function openRepairModal(machineId, name, agentType) {
  repairMachineId = machineId;
  repairAgentType = agentType || 'hermes';
  document.getElementById('repair-machine-name').textContent = name;
  document.getElementById('repair-problem').value = '';
  document.getElementById('repair-preset').value = '';
  document.getElementById('repair-output-area').innerHTML = '';
  openModal('modal-repair');
}

async function runRepair() {
  const problem = document.getElementById('repair-problem').value.trim()
    || document.getElementById('repair-preset').value
    || 'General health check and repair';
  const area = document.getElementById('repair-output-area');

  area.innerHTML = `
    <div class="cmd-output" style="border-left:3px solid #ff9f43;padding:12px;margin-top:12px">
      <div style="color:#ff9f43;font-weight:600;margin-bottom:8px">⏳ KiloClaw is working on it...</div>
      <div style="color:var(--muted);font-size:12px">Connecting via Tailscale → Diagnosing → Applying fixes</div>
      <div style="color:var(--muted);font-size:11px;margin-top:6px">This may take 30–90 seconds depending on what needs fixing.</div>
    </div>`;

  const res = await api('/machines/' + repairMachineId + '/repair', {
    method: 'POST',
    body: { problem }
  });

  if (!res?.ok) {
    area.innerHTML = `<div class="cmd-output" style="color:var(--danger);border-left:3px solid var(--danger);padding:12px;margin-top:12px">
      ❌ ${esc(res?.error || 'Repair request failed')}
    </div>`;
    return;
  }

  area.innerHTML = `
    <div class="cmd-output" style="border-left:3px solid #00ccff;padding:12px;margin-top:12px">
      <div style="color:#00ccff;font-weight:600;margin-bottom:8px">✅ Repair task queued</div>
      <div style="font-size:12px">Machine: <strong>${esc(res.task?.hostname || repairMachineId)}</strong></div>
      <div style="font-size:12px">Problem: <em>${esc(problem)}</em></div>
      <div style="font-size:12px">Tailscale IP: <span style="color:#00ccff">${esc(res.task?.tailscale_ip || '—')}</span></div>
      <div style="color:var(--muted);font-size:11px;margin-top:8px">KiloClaw will SSH in and report back shortly. Check the Events log for the repair report.</div>
    </div>`;
}

// ── Command Modal ──────────────────────────────────────────────────
function openCmdModal(machineId, name) {
  cmdMachineId = machineId;
  document.getElementById('cmd-machine-name').textContent = name;
  document.getElementById('cmd-input').value = '';
  document.getElementById('cmd-output-area').innerHTML = '';
  openModal('modal-command');
}

function updateCmdInput() {
  const val = document.getElementById('cmd-select').value;
  if (val) document.getElementById('cmd-input').value = val;
}

async function runCommand() {
  const cmd = document.getElementById('cmd-input').value.trim();
  if (!cmd) return;
  const outputArea = document.getElementById('cmd-output-area');
  outputArea.innerHTML = '<div class="cmd-output">⏳ Sending command…</div>';

  const res = await api('/machines/' + cmdMachineId + '/command', { method: 'POST', body: { cmd } });
  if (!res?.ok) {
    outputArea.innerHTML = `<div class="cmd-output" style="color:var(--danger)">${esc(res?.error || 'Failed — machine may be offline')}</div>`;
    return;
  }

  // Real-time: wait for command_result via admin socket (with 15s timeout fallback)
  outputArea.innerHTML = '<div class="cmd-output">⚡ Command sent — waiting for response…</div>';

  const timeout = setTimeout(() => {
    // Fallback: fetch from DB if socket didn't deliver
    api('/machines/' + cmdMachineId).then(m => {
      const last = m?.commands?.[0];
      if (last?.output) {
        outputArea.innerHTML = `<div class="cmd-output">${esc(last.output)}</div>`;
      } else {
        outputArea.innerHTML = '<div class="cmd-output" style="color:var(--muted)">No response received — check Events tab</div>';
      }
    });
  }, 15000);

  // One-shot listener — resolves as soon as the result arrives
  function onResult(event) {
    if (event.type === 'command_result' && event.machine_id === cmdMachineId) {
      clearTimeout(timeout);
      adminSocket.off('admin_event', onResult);
      const color = event.returncode === 0 ? '' : 'color:var(--danger)';
      outputArea.innerHTML = `<div class="cmd-output" style="${color}">${esc(event.output)}</div>`;
    }
  }
  adminSocket.on('admin_event', onResult);
}

// ── Modals ─────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); });
});

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Admin Socket.IO (real-time push from server) ─────────────────────────
let adminSocket = null;

function connectAdminSocket() {
  if (adminSocket) return;
  adminSocket = io({ query: { admin: '1' }, transports: ['websocket', 'polling'] });

  adminSocket.on('connect', () => console.log('[admin-socket] connected'));
  adminSocket.on('disconnect', () => console.log('[admin-socket] disconnected'));

  adminSocket.on('admin_event', (event) => {
    // Live dashboard refresh on connect/disconnect
    if ((event.type === 'machine_online' || event.type === 'machine_offline') && currentPage === 'dashboard') {
      loadPage('dashboard');
    }
    // Live Tailscale badge update — no full page reload needed
    if (event.type === 'machine_info_updated') {
      const cell = document.getElementById('ts-cell-' + event.machine_id);
      if (cell) {
        cell.innerHTML = event.tailscale_connected
          ? `<span style="color:#00ccff;font-size:12px" title="${event.tailscale_ip||''}">🔒 ${event.tailscale_ip||'connected'}</span>`
          : `<span style="color:var(--muted);font-size:12px">—</span>`;
      }
    }
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
if (TOKEN) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-name').textContent = '👤 jay';
  connectAdminSocket();
  loadPage('dashboard');
} else {
  // focus password on enter from username
  document.getElementById('login-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-pass').focus();
  });
}

// Auto-refresh dashboard every 30s
setInterval(() => { if (currentPage === 'dashboard') loadPage('dashboard'); }, 30000);
</script>
